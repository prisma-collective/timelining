# Timelining Neo4j Community — Railway / propagate provisioned deployments

server.default_listen_address=0.0.0.0
server.bolt.listen_address=0.0.0.0:7687
server.http.listen_address=0.0.0.0:7474

# Allow bolt connections via Railway TCP proxy (no TLS termination on proxy)
server.bolt.tls_level=DISABLED

# Vector index support (timelining embeddings)
dbms.security.procedures.unrestricted=apoc.*,gds.*
dbms.security.procedures.allowlist=apoc.*,gds.*

# Conservative defaults for small Railway instances
server.memory.heap.initial_size=512m
server.memory.heap.max_size=512m
server.memory.pagecache.size=256m

# Auth is set via NEO4J_AUTH env var at deploy time (neo4j/{password})
